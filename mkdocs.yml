site_name: Lens Service Notes
site_description: Repair and service guides for camera lenses
site_author: Steven Kasapi

theme:
  name: material
  palette:
    scheme: default
    primary: black
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.tooltips

docs_dir: docs
site_dir: site

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
