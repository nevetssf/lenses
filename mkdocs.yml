site_name: Lens Service Notes
site_description: Repair and service guides for camera lenses
site_author: Steven Kasapi

theme:
  name: material
  palette:
    scheme: default
    primary: black
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.tooltips

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Canon:
    - FD 50mm f/1.4 SSC: Canon/fd-50mm-f1.4-ssc.md
  - Leica:
    - Summar 50mm f/2: Leica/summar-50mm-f2.md
  - Nikon:
    - Nikkor 50mm f/1.4 AIS: Nikon/nikkor-50mm-f1.4-ais.md
  - Contact: contact.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
